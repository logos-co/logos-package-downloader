fetch every repo's logos-repo.json + index.json\n\nConfig:\n  config init <path>            Create an empty repository config file\n  config show                   Print the resolved config JSON\n  config path                   Print the current --config path (or \"(none)\")\n\nGlobal options:\n  --config <path>               Path to repositories.json (required for any\n                                mutating repo command).\n  --repo <url-or-name>          Restrict a catalog/download command to one repo.\n  --version <ver>               Pin a specific package version (download/info).\n  --root-hash <hex>             Disambiguate two releases sharing a version.\n  --category <cat>              Filter by category (list).\n  -o, --output <dir>            Output directory (download).\n  --json                        Emit structured JSON.\n  -h, --help                    Show this help.\n  -V, --version                 Print version (a bare --version, with no value\n                                following, also prints the version).\n", "note": ""}]}, {"md": "## Step 2: Scaffold a repository config\n\nRepository-management commands operate on a config file passed with `--config`.\n`config init` writes an empty one you can then inspect.", "execs": []}, {"md": "### 2.1 Create an empty config\n\n```bash\nlgpd config init ./repositories.json\n```", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd config init ./repositories.json", "status": "pass", "exit_code": 0, "output": "Created ./repositories.json\n", "note": ""}]}, {"md": "### 2.2 Print the active config path\n\n```bash\nlgpd --config ./repositories.json config path\n```", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd --config ./repositories.json config path", "status": "pass", "exit_code": 0, "output": "./repositories.json\n", "note": ""}]}, {"md": "### 2.3 Show the resolved config\n\n```bash\nlgpd --config ./repositories.json config show\n```\n\nA freshly-initialised config carries an empty user `repositories` array \u2014 the\nbuilt-in default repository (below) is compiled in, not stored here.", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd --config ./repositories.json config show", "status": "pass", "exit_code": 0, "output": "{\n  \"schemaVersion\": 1,\n  \"repositories\": [],\n  \"defaultDisabled\": false\n}\n", "note": ""}]}, {"md": "## Step 3: List the configured repositories\n\n`repo list` shows every repository the catalog is assembled from. Even with an empty\nconfig, the built-in default repository is always present \u2014 its URL is compiled into\n`lgpd`, so the entry itself appears without any config. (Its human-readable *name* is\nresolved from the repository's `logos-repo.json` over the network, so we assert on\nthe always-present structural markers \u2014 the `Configured repositories:` header and the\n`[default]` tag \u2014 rather than the fetched name.)", "execs": []}, {"md": "### 3.1 repo list\n\n```bash\nlgpd --config ./repositories.json repo list\n```", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd --config ./repositories.json repo list", "status": "pass", "exit_code": 0, "output": "Configured repositories:\n  logos-modules-official  (Logos Official) [default]\n    url:      https://raw.githubusercontent.com/logos-co/logos-modules-release/refs/heads/main/logos-repo.json\n    indexUrl: https://github.com/logos-co/logos-modules-release/releases/download/index/index.json\n", "note": ""}]}, {"md": "### 3.2 Repo mutations require --config (error path)\n\nRunning a `repo` mutation without `--config` is a usage error \u2014 `lgpd` says so\nand points you at `config init`. We add `|| true` so the doc-test can assert on\nthe message of this deliberately failing command.\n\n```bash\nlgpd repo add https://example.com/my/logos-repo.json\n```", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd repo add https://example.com/my/logos-repo.json || true", "status": "pass", "exit_code": 0, "output": "Error: 'repo add' requires --config <path>\nHint: run `lgpd config init /path/to/repositories.json` first,\n      then pass --config /path/to/repositories.json to all repo commands.\n", "note": ""}]}, {"md": "## Step 4: Search the catalog\n\n`search` filters the merged catalog by name/description. Searching for a term that\nmatches nothing returns a clean, offline-safe empty result \u2014 the assertion below\ndoesn't depend on what packages the live catalog currently holds.", "execs": []}, {"md": "### 4.1 Search for a non-existent package\n\n```bash\nlgpd search zzz-no-such-package-xyz\n```", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd --config ./repositories.json search zzz-no-such-package-xyz", "status": "pass", "exit_code": 0, "output": "No packages found matching 'zzz-no-such-package-xyz'\n", "note": ""}]}, {"md": "### 4.2 Browse the live catalog (shown, not asserted)\n\n`lgpd list` prints whatever the live catalog currently advertises \u2014 useful\ninteractively, but its content changes over time, so this doc-test runs it for\nillustration and does not assert on the output. `|| true` keeps the step green\nregardless of network availability.\n\n```bash\nlgpd list\n```", "execs": [{"kind": "run", "cmd": "./lgpd/bin/lgpd --config ./repositories.json list || true", "status": "pass", "exit_code": 0, "output": "Found 14 package(s):\n\nNAME                             CATEGORY     TYPE       DESCRIPTION                             \n--------------------------------------------------------------------------------------------------\nlogos_execution_zone             blockchain   core       Logos Execution Zone Module for Logos Co\nliblogos_blockchain_module       blockchain   core       Logos blockchain node for logos-core    \nlez_wallet_ui                    wallet       ui_qml     Execution Zone Wallet UI module for the \nchat_module                      chat         core       Chat module for Logos                   \nblockchain_ui                    blockchain   ui_qml     Blockchain UI module for the Logos appli\nopenmetrics                      monitoring   core       Serves an OpenMetrics /metrics endpoint \nwallet_ui                        wallet       ui_qml     Wallet interface for the Logos applicati\nwallet_module                    wallet       core       Wallet module using go-wallet-sdk C libr\nstorage_ui                       storage      ui_qml     Storage interface for the Logos applicat\nstorage_module                   protocol     core       Storage module                          \ndelivery_module                  protocol     core       Logos Delivery Module - High-level messa\nchat_ui                          chat         ui_qml     Chat App for Logos - Private messaging i\naccounts_ui                      accounts     ui_qml     Accounts interface for the Logos applica\naccounts_module                  accounts     core       Accounts module using go-wallet-sdk C li\n", "note": ""}]}, {"md": "## Recap\n\nYou built this commit of `lgpd` and toured its offline-deterministic surface:\n\n| Command | What it does |\n|---|---|\n| `config init <path>` | scaffold an empty repository config |\n| `config show` / `config path` | inspect the resolved config |\n| `repo list` | list repositories (built-in default always present) |\n| `search <query>` | filter the catalog (empty result shown here) |\n| `list` / `download` / `info` | live-catalog commands (network-dependent) |\n\nBecause `lgpd` is built from the commit under test, a green run proves the\ndownloader's CLI still builds and behaves.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
