name: Build & Release

# Builds distributable lgpd artifacts and, on release/** branches, publishes
# them as a GitHub pre-release. Modeled on logos-basecamp's build.yml.
#
#   Linux (x86_64 + aarch64): build the AppImage, chmod +x, wrap in a tar.gz.
#   macOS (aarch64):          build the portable cli-bundle-dir (bin/ + lib/),
#                             strip the Gatekeeper quarantine flag the way
#                             Homebrew handles casks, wrap in a tar.gz.

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches: [master]

jobs:
  build-appimage:
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build cli-appimage
        run: nix build .#cli-appimage -L

      - name: Smoke test (AppImage runs)
        run: |
          src=$(find result/ -name '*.AppImage' -print -quit)
          out=$(APPIMAGE_EXTRACT_AND_RUN=1 "$src" --help 2>&1 || true)
          echo "$out"
          echo "$out" | grep -qi usage

      - name: Package AppImage as tarball
        run: |
          arch="${{ matrix.arch }}"
          arch_short="${arch%%-*}"
          src=$(find result/ -name '*.AppImage' -print -quit)
          cp "$src" "lgpd-${arch_short}.AppImage"
          chmod +x "lgpd-${arch_short}.AppImage"
          tar -czf "lgpd-${arch_short}-linux.tar.gz" "lgpd-${arch_short}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: lgpd-*-linux.tar.gz

  build-macos-bundle:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build cli-bundle-dir
        run: nix build .#cli-bundle-dir -L

      - name: Smoke test (bundled binary runs)
        run: |
          out=$(./result/bin/lgpd --help 2>&1 || true)
          echo "$out"
          echo "$out" | grep -qi usage

      - name: Package bundle as tarball
        run: |
          dst="lgpd-aarch64-macos"
          # Copy out of the read-only Nix store into a writable, archive-named dir.
          rm -rf "$dst" && mkdir "$dst"
          cp -RL result/. "$dst/"
          chmod -R u+w "$dst"
          # Strip the Gatekeeper quarantine attribute the way Homebrew's cask
          # Quarantine.release! does. No-op on freshly built binaries (the Nix
          # store carries none) but keeps the published artifact clean. The
          # binaries are already validly ad-hoc signed by Nix — no re-signing.
          /usr/bin/xattr -r -d com.apple.quarantine "$dst" 2>/dev/null || true
          tar -czf "$dst.tar.gz" "$dst"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-darwin
          path: lgpd-aarch64-macos.tar.gz

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    needs: [build-appimage, build-macos-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: appimage-x86_64-linux
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: appimage-aarch64-linux
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: macos-aarch64-darwin
          path: artifacts/

      - name: Generate tag
        id: tag
        run: echo "tag=pre-release-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          body: |
            ## Install

            ### Linux

            The artifact is an [AppImage](https://appimage.org/) — a single self-contained executable. Download it, extract, and drop it on your `PATH` as `lgpd` (swap `x86_64` for `aarch64` on ARM):

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/lgpd-x86_64-linux.tar.gz
            tar -xvf lgpd-x86_64-linux.tar.gz
            mkdir -p ~/.local/bin
            install -m755 lgpd-x86_64.AppImage ~/.local/bin/lgpd
            # make sure ~/.local/bin is on your PATH (add this to ~/.bashrc or ~/.zshrc):
            export PATH="$HOME/.local/bin:$PATH"
            ```

            Now `lgpd` runs from anywhere. (If you hit a FUSE error, run it as `APPIMAGE_EXTRACT_AND_RUN=1 lgpd`.)

            ### macOS (Apple Silicon)

            > **Download from the terminal with `wget` or `curl` — _not_ a web browser.** Browsers tag downloads with `com.apple.quarantine`, which makes Gatekeeper block this unsigned binary. Fetching over the terminal and extracting with `tar` never sets that flag, so the binary runs as-is — no signing or notarization needed.

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/lgpd-aarch64-macos.tar.gz
            tar -xvf lgpd-aarch64-macos.tar.gz
            # move the whole folder somewhere permanent (keep its contents together —
            # the binary finds its libraries via ../lib) and put its bin/ on your PATH:
            mv lgpd-aarch64-macos ~/.local/lgpd
            echo 'export PATH="$HOME/.local/lgpd/bin:$PATH"' >> ~/.zshrc
            source ~/.zshrc
            ```

            Now `lgpd` runs from anywhere.
          files: |
            artifacts/*.tar.gz
